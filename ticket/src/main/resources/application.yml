server:
  port: 8081

spring:
  application:
    name: ticket-service

  datasource:
    url: jdbc:postgresql://localhost:5433/ticket_db
    username: ticket_user
    password: ticket_pass
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      idle-timeout: 30000
      connection-timeout: 20000

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379
      timeout: 2000

  jackson:
    serialization:
      write-dates-as-timestamps: false

  mvc:
    locale: en
    locale-resolver: fixed

jwt:
  secret: my-super-secret-key-that-is-long-enough-1234567890-very-secure
  expiration: 86400000

logging:
  level:
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG